    no.style.position = "fixed";

}

function yes(){

        pasensya lovey ko, i hope you forgive me.<br><br>
        but if no, i will respect it po.
        
         nasa sa'yo po yun if mas pipiliin mo si greg, tsk haha tsk 🙄🙄

}
</script>

</html>
